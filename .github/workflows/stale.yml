name: Stale Issue Management

on:
  schedule:
    - cron: "45 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v10
        with:
          stale-issue-message: "This issue has been inactive for 30 days. It will close in 7 days unless updated."
          stale-pr-message: "This PR has been inactive for 21 days. It will close in 7 days unless updated."
          close-issue-message: "Closing due to inactivity. Reopen if this still needs work."
          close-pr-message: "Closing due to inactivity. Reopen if this still needs work."
          stale-issue-label: stale
          stale-pr-label: stale
          days-before-issue-stale: 30
          days-before-pr-stale: 21
          days-before-issue-close: 7
          days-before-pr-close: 7
          exempt-issue-labels: "priority:high,security"
          exempt-pr-labels: "priority:high"
