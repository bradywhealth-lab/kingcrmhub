name: Runner tick

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: read
  issues: write

concurrency:
  group: runner-tick-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-tick:
    name: Run internal schedulers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      INTERNAL_RUNNER_KEY: ${{ secrets.INTERNAL_RUNNER_KEY }}
      RUNNER_ORGANIZATION_ID: ${{ secrets.RUNNER_ORGANIZATION_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Trigger internal runner endpoints
        run: node scripts/run-internal-runners.mjs

      - name: Open or refresh failure issue
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Runner tick failed'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              'The scheduled runner tick failed.',
              '',
              `- Workflow: ${context.workflow}`,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              `- Triggered at: ${new Date().toISOString()}`,
            ].join('\n')

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            })

            const existing = issues.find((issue) => issue.title === title)
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              })
            }

      - name: Close previous failure issue after recovery
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Runner tick failed'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            })

            const existing = issues.find((issue) => issue.title === title)
            if (!existing) {
              return
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Runner tick recovered. Closing after successful run: ${runUrl}`,
            })

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed',
            })
