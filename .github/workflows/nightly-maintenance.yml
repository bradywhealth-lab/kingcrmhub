name: Nightly Maintenance

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    name: Run nightly health checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: file:./prisma/dev.db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-placeholder-secret
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-key
      OPENAI_API_KEY: ci-placeholder-key
      INTERNAL_RUNNER_KEY: ci-placeholder-key
      APP_BASE_URL: http://localhost:3000
      RUNNER_ORGANIZATION_ID: ci-org
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Run lint, typecheck, tests, and build
        run: bun run lint && bun run typecheck && bun run test && bun run build

  create-alert-issue:
    name: Open or update maintenance incident issue
    runs-on: ubuntu-latest
    needs:
      - health-check
    if: always() && needs.health-check.result == 'failure'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create or update issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Nightly maintenance failed";
            const body = [
              "Nightly maintenance checks failed.",
              "",
              `- Workflow run: ${process.env.RUN_URL}`,
              `- Commit: ${process.env.SHA}`,
              `- Trigger: ${context.eventName}`,
              "",
              "Next step: open the run logs, fix the failing step, and re-run this workflow."
            ].join("\n");

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${title}"`,
              per_page: 1,
            });

            if (existing.data.items.length > 0) {
              const issueNumber = existing.data.items[0].number;
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
              core.info(`Updated issue #${issueNumber}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              core.info(`Created issue #${created.data.number}`);
            }
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
