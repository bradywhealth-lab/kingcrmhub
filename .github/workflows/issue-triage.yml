name: AI-Assisted Issue Triage

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: read
  issues: write

jobs:
  triage:
    name: Classify and guide issue intake
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels and post intake checklist
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8
        with:
          script: |
            const issue = context.payload.issue;
            const text = `${issue.title}\n${issue.body || ""}`.toLowerCase();
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const labelSpecs = [
              { name: "bug", color: "d73a4a" },
              { name: "enhancement", color: "a2eeef" },
              { name: "documentation", color: "0075ca" },
              { name: "security", color: "b60205" },
              { name: "database", color: "5319e7" },
              { name: "frontend", color: "1d76db" },
            ];

            const wantedLabels = new Set();
            if (/(bug|error|broken|fail|crash|exception)/.test(text)) wantedLabels.add("bug");
            if (/(feature|enhancement|improvement|request)/.test(text)) wantedLabels.add("enhancement");
            if (/(doc|readme|documentation)/.test(text)) wantedLabels.add("documentation");
            if (/(security|vulnerability|xss|csrf|injection|token leak)/.test(text)) wantedLabels.add("security");
            if (/(prisma|database|postgres|sql|migration|schema)/.test(text)) wantedLabels.add("database");
            if (/(ui|ux|frontend|layout|component|styling|css)/.test(text)) wantedLabels.add("frontend");

            for (const spec of labelSpecs) {
              if (!wantedLabels.has(spec.name)) continue;
              try {
                await github.rest.issues.getLabel({ owner, repo, name: spec.name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: spec.name,
                    color: spec.color,
                  });
                } else {
                  throw error;
                }
              }
            }

            if (wantedLabels.size > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: [...wantedLabels],
              });
            }

            if (context.payload.action !== "opened") {
              return;
            }

            const marker = "<!-- maintainer-ai-triage -->";
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issue.number,
              per_page: 100,
            });
            const hasChecklist = comments.some((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (hasChecklist) return;

            const checklist = [
              marker,
              "Thanks for opening this. To speed up solo maintenance, please add:",
              "",
              "- Repro steps (exact sequence)",
              "- Expected behavior",
              "- Actual behavior",
              "- Logs/screenshots",
              "- Scope guess (frontend/backend/database/automation)",
              "",
              "Suggested AI prompt:",
              "> Reproduce issue #"+issue.number+" in this repo, identify root cause, and propose a minimal fix with tests.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: checklist,
            });
