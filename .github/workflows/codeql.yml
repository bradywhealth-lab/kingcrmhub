name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7f44ef6831f7cfd2f4fd0cde5d7f8cf5f8e0f7f # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Autobuild
        uses: github/codeql-action/autobuild@b7f44ef6831f7cfd2f4fd0cde5d7f8cf5f8e0f7f # v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@b7f44ef6831f7cfd2f4fd0cde5d7f8cf5f8e0f7f # v3
