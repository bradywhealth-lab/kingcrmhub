name: Secret Scan

on:
  push:
    branches:
      - main
      - cursor/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v5

      - name: Run gitleaks (fail on findings)
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            zricethezav/gitleaks:v8.24.2 \
            detect --source=/repo --no-git --verbose
